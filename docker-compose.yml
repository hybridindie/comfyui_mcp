version: "3.8"

services:
  comfyui-mcp:
    build: .
    image: comfyui-mcp:latest
    container_name: comfyui-mcp
    environment:
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
      - COMFYUI_SECURITY_MODE=${COMFYUI_SECURITY_MODE:-audit}
      - COMFYUI_LOG_LEVEL=${COMFYUI_LOG_LEVEL:-INFO}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - comfyui-mcp-data:/root/.comfyui-mcp
    restart: unless-stopped

volumes:
  comfyui-mcp-data:
