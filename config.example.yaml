comfyui:
  url: "http://comfyui:8188"
  # Optional: public URL to use when get_image is asked for a direct URL.
  # Useful when ComfyUI is only reachable internally, such as behind k3s ingress.
  external_url: ""

model_search:
  # Optional: needed for gated/private HuggingFace models and higher API limits.
  # Env override: COMFYUI_HUGGINGFACE_TOKEN
  huggingface_token: ""
  # Optional: needed for CivitAI resources that require authentication.
  # Env override: COMFYUI_CIVITAI_API_KEY
  civitai_api_key: ""
  max_search_results: 10

security:
  mode: "audit"

logging:
  audit_file: "~/.comfyui-mcp/audit.log"
